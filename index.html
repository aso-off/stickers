<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Sticker Dump</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flag-icons@7.5.0/css/flag-icons.min.css"
    />
    <script type="module" crossorigin src="./assets/index-3nVRs-t9.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-D7jkMXDj.css">
  </head>
  <body>
    <div class="app-container">
      <!-- Top Actions Bar -->
      <div class="header-actions">
        <!-- Theme Toggle Button -->
        <button class="action-btn" id="themeToggle" title="Сменить тему">
          <img src="nightmode.svg" alt="Тема" id="themeIcon" />
        </button>
        <!-- Language Switcher -->
        <div class="lang-switcher" id="langSwitcher">
          <button class="action-btn lang-toggle-btn" id="langBtn">
            <span class="fi fi-ru" id="currentLangFlag"></span>
            <span id="currentLangCode">RU</span>
          </button>
          <div class="lang-dropdown hidden" id="langDropdown">
            <button class="lang-drop-opt active" data-lang="ru" id="optLangRu">
              <span class="fi fi-ru"></span>RU
            </button>
            <button class="lang-drop-opt" data-lang="en" id="optLangEn">
              <span class="fi fi-us"></span>EN
            </button>
          </div>
        </div>
      </div>

      <!-- Header -->
      <header class="app-header">
        <h1 class="glow-text">Sticker Dump</h1>
      </header>

      <!-- Main Layout (Centered Single Card) -->
      <main class="main-layout single-layout">
        <section class="control-section">
          <!-- Upload Zone -->
          <div class="upload-card" id="dropZone">
            <input
              type="file"
              id="fileInput"
              accept=".tgs,.webm,.webp"
              style="display: none"
            />
            <div class="upload-content" id="uploadPrompt">
              <div class="icon-wrapper">
                <img src="add.svg" alt="Добавить" class="upload-icon" />
              </div>
              <h3 id="uploadTitle">Загрузить стикер</h3>
              <p class="upload-hint" id="uploadHint">
                Нажмите для выбора файла
              </p>
              <span class="formats-badge">.tgs, .webm, .webp</span>
            </div>

            <!-- Active Viewer (Hidden by default) -->
            <div class="viewer-container hidden" id="viewerContainer">
              <!-- Close/Reset Button -->
              <button class="reset-btn" id="resetBtn" title="Сбросить стикер">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M18 6L6 18M6 6L18 18"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>

              <!-- Sticker Display Frame -->
              <div class="sticker-frame bg-dark" id="stickerFrame">
                <!-- Skeleton Loader -->
                <div class="skeleton-loader hidden" id="skeletonLoader">
                  <div class="skeleton-circle"></div>
                </div>

                <!-- Display elements (Dynamic) -->
                <div class="display-wrapper" id="displayWrapper"></div>
              </div>

              <!-- Live Backdrop Controls -->
              <div class="backdrop-controls">
                <button
                  class="bg-control active"
                  data-bg="dark"
                  id="bgDarkBtn"
                  title="Темный"
                >
                  <span class="dot bg-dot-dark"></span>
                </button>
                <button
                  class="bg-control"
                  data-bg="light"
                  id="bgLightBtn"
                  title="Светлый"
                >
                  <span class="dot bg-dot-light"></span>
                </button>
                <button
                  class="bg-control"
                  data-bg="grid"
                  id="bgGridBtn"
                  title="Сетка прозрачности"
                >
                  <span class="dot bg-dot-grid"></span>
                </button>
                <button
                  class="bg-control"
                  data-bg="tg"
                  id="bgTgBtn"
                  title="Чат Telegram"
                >
                  <span class="dot bg-dot-tg"></span>
                </button>
              </div>
            </div>
          </div>

          <!-- Interactive Speed Control Card (Active only when sticker is loaded) -->
          <div class="control-card hidden" id="speedCard">
            <div class="card-header">
              <span class="card-title" id="speedTitle"
                >Скорость воспроизведения</span
              >
              <span class="speed-val" id="speedVal">1.00x</span>
            </div>
            <div class="slider-container">
              <input
                type="range"
                id="speedSlider"
                min="0"
                max="100"
                step="1"
                value="50"
                disabled
              />
              <div class="slider-ticks">
                <span>0.1x</span>
                <span style="margin-left: 10px">1.0x</span>
                <span>10.0x</span>
              </div>
            </div>
          </div>

          <!-- Metadata Information Card -->
          <div class="control-card hidden" id="infoCard">
            <h3 id="infoTitle">Характеристики файла</h3>
            <div class="info-grid">
              <div class="info-row">
                <span class="info-label" id="lblInfoName">Имя файла:</span>
                <span class="info-value text-truncate" id="infoName">-</span>
              </div>
              <div class="info-row">
                <span class="info-label" id="lblInfoType">Тип стикера:</span>
                <span class="info-value" id="infoType">-</span>
              </div>
              <div class="info-row">
                <span class="info-label" id="lblInfoParam"
                  >Свойство объекта:</span
                >
                <span class="info-value code-value" id="infoParam">-</span>
              </div>
              <div class="info-row">
                <span class="info-label" id="lblInfoTag">Тег в Mini App:</span>
                <span class="info-value code-value" id="infoTag">-</span>
              </div>
              <div class="info-row">
                <span class="info-label" id="lblInfoSize">Размер:</span>
                <span class="info-value" id="infoSize">-</span>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Scripts -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  </body>
</html>
